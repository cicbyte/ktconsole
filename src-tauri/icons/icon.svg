<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1420"/>
      <stop offset="100%" stop-color="#141e2b"/>
    </linearGradient>
    <linearGradient id="flow" x1="132" y1="0" x2="380" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="100" fill="none" stroke="#1a2636" stroke-width="1"/>

  <!-- Tunnel pipe -->
  <rect x="152" y="242" width="208" height="28" rx="14" fill="none" stroke="url(#flow)" stroke-width="3"/>
  <rect x="152" y="242" width="208" height="28" rx="14" fill="url(#flow)" opacity="0.04"/>

  <!-- Left node: Local (server) -->
  <circle cx="132" cy="256" r="40" fill="#00d4aa" opacity="0.06" filter="url(#glow)"/>
  <circle cx="132" cy="256" r="30" fill="#0b1a28" stroke="#00d4aa" stroke-width="3"/>
  <line x1="120" y1="248" x2="144" y2="248" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="256" x2="144" y2="256" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="264" x2="144" y2="264" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>

  <!-- Right node: Public (cloud) -->
  <circle cx="380" cy="256" r="40" fill="#4facfe" opacity="0.06" filter="url(#glow)"/>
  <circle cx="380" cy="256" r="30" fill="#0b1a28" stroke="#4facfe" stroke-width="3"/>
  <circle cx="372" cy="250" r="5" fill="#4facfe" opacity="0.3"/>
  <circle cx="384" cy="248" r="6" fill="#4facfe" opacity="0.3"/>
  <circle cx="380" cy="258" r="7" fill="#4facfe" opacity="0.25"/>
  <circle cx="375" cy="264" r="4" fill="#4facfe" opacity="0.2"/>

  <!-- Center glow point (active tunnel connection) -->
  <circle cx="256" cy="256" r="18" fill="#00d4aa" opacity="0.15" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="7" fill="#00d4aa"/>
  <circle cx="256" cy="256" r="2.5" fill="#fff" opacity="0.95"/>

  <!-- Flow particles -->
  <circle cx="188" cy="256" r="2" fill="#00d4aa" opacity="0.45"/>
  <circle cx="216" cy="256" r="2.5" fill="#10ccbc" opacity="0.55"/>
  <circle cx="296" cy="256" r="2.5" fill="#30b8d0" opacity="0.55"/>
  <circle cx="324" cy="256" r="2" fill="#4facfe" opacity="0.45"/>
</svg>
